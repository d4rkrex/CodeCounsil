name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # CC-SRE-001: merged into single step (was two separate pytest runs)
      - name: Run tests with coverage
        run: pytest --tb=short -q --cov=core --cov-report=term-missing --cov-fail-under=70

      # Roadmap Etapa 1: Run evaluation harness against fixture projects
      # Only runs when fixture reviews already exist (.review/ dirs present)
      # On fresh CI runs this is a no-op; fixtures must be pre-reviewed and committed
      - name: Run evaluation harness (if fixtures reviewed)
        run: codecouncil-eval --format json | python -c "
import json, sys
results = json.load(sys.stdin)
for r in results:
    if r.get('recall') is not None and r['recall'] == 0.0 and r.get('findings_total', 0) == 0:
        print(f\"  {r['project']}: no review output (skip)\")
    else:
        print(f\"  {r['project']}: recall={r.get('recall')} precision={r.get('precision')} fp={r.get('false_positives')}\")
" || echo "Evaluation complete (some fixtures pending review)"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check core/ tests/ --ignore E501
